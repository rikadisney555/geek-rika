<!DOCTYPE html>
<html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap"
      rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet">

<head>
    <meta charset="UTF-8">
    <title>ディズニー攻略診断</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="top-page">

        <div class="hero-card">
             <img
                src="{{ url_for('static', filename='castle.png') }}"
                class="logo">
            
            <p class="app-name">
                Disney Planner
            </p>

            <h1 class="main-title">
                あなたにぴったりの<br>
                ディズニー攻略プラン診断
            </h1>

            <p class="sub-title">
                あなたは何タイプ？？<br>
                8つのタイプで今日のおすすめ攻略順を提案します
            </p>

            <div class="feature-list">

                <h3>
                    こんな人におすすめ
                </h3>

                <p>
                    ✔ ショー派？アトラクション派？自分のタイプを知りたい
                </p>

                <p>
                    ✔ 待ち時間を考慮して効率よく回りたい
                </p>

                <p>
                    ✔ 自分に合うレストランを知りたい
                </p>

                <p>
                    ✔ ディズニーをもっと楽しみたい
                </p>

        <div class="how-to">

            <h3>
                診断方法
            </h3>

            <div class="step-card">

                <img
                    src="{{ url_for('static', filename='crown.png') }}"
                    class="step-icon">

                <div>
                    <span>
                        STEP 1
                    </span>

                    <p>
                        あなたのパークタイプを診断
                    </p>
                </div>

            </div>

            <div class="step-card">

                <img
                    src="{{ url_for('static', filename='book.png') }}"
                    class="step-icon">

                <div>
                    <span>
                        STEP 2
                    </span>

                    <p>
                        予算・同行者・重視ポイントを入力
                    </p>
                </div>

            </div>

            <div class="step-card">

                <img
                    src="{{ url_for('static', filename='clock.png') }}"
                    class="step-icon">

                <div>
                    <span>
                        STEP 3
                    </span>

                    <p>
                        乗りたいアトラクションと待ち時間を入力
                    </p>
                </div>

            </div>

            <div class="step-card">

                <img
                    src="{{ url_for('static', filename='castle.png') }}"
                    class="step-icon">

                <div>
                    <span>
                        STEP 4
                    </span>

                    <p>
                        あなただけの攻略プランが完成
                    </p>
                </div>

            </div>

</div>

            <a href="/question">
                <button class="main-button">
                    診断を始める
                </button>
            </a>

        </div>

    </div>

</body>

</html>
